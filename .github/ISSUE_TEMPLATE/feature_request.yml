name: Feature request
description: Propose a focused evaluation workflow or adapter improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which concrete translation-evaluation workflow is currently painful?
    validations:
      required: true
  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: What are you doing today instead?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful change and its expected artifact or CLI behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Recipe execution
        - Hard validators
        - Judge calibration
        - Automatic metrics
        - Dataset adapter
        - Reporting
        - Developer experience
    validations:
      required: true
